<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elite Terminal | Ultra Clock</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e0f; --surface: #18181b; --border: #2a2a2e;
    --text: #f4f4f5; --muted: #71717a; --accent: #22d3ee;
    --green: #4ade80; --red: #f87171; --mono: 'DM Mono', monospace; --syne: 'Syne', sans-serif;
  }
  [data-theme="light"] {
    --bg: #f4f4f5; --surface: #ffffff; --border: #e4e4e7;
    --text: #09090b; --muted: #71717a; --accent: #0891b2;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); padding: 20px; transition: 0.3s; overflow: hidden; position: relative; min-height: 100vh; }

  /* Background Chart */
  #chart-canvas {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    z-index: -1; opacity: 0.2; pointer-events: none;
  }

  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; position: relative; z-index: 10; }
  .location { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 3px; font-weight: 700; }

  /* ULTRA CLOCK DISPLAY */
  .clock-container { text-align: center; margin-top: 10px; position: relative; z-index: 10; }
  .day-text { font-size: 18px; color: var(--accent); text-transform: uppercase; letter-spacing: 10px; margin-bottom: 5px; font-weight: 700; opacity: 0.8; }
  
  .time-text { 
    font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif; 
    font-size: 160px; /* MEGA SIZE */
    text-transform: uppercase;
    line-height: 0.75; 
    letter-spacing: -5px; /* Tighter Impact look */
    margin-bottom: 15px;
    color: var(--text);
    filter: drop-shadow(0 0 40px rgba(34, 211, 238, 0.15));
  }
  
  .date-text { font-size: 14px; color: var(--muted); margin-bottom: 30px; letter-spacing: 4px; font-weight: 500; }

  .session-timeline { width: 80%; max-width: 600px; height: 3px; background: var(--border); margin: 0 auto 30px; border-radius: 10px; overflow: hidden; }
  #timeline-fill { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 15px var(--accent); transition: 1s; }

  .sessions { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; position: relative; z-index: 10; }
  .session-badge {
    padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border);
    font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--muted);
    display: flex; align-items: center; gap: 10px; transition: 0.4s;
    background: var(--surface);
  }
  .session-badge.active { border-color: var(--accent); color: var(--text); background: rgba(34, 211, 238, 0.05); transform: scale(1.1); }
  .dot { width: 8px; height: 8px; background: var(--muted); border-radius: 50%; }
  .active .dot { background: var(--accent); box-shadow: 0 0 10px var(--accent); animation: pulse 2s infinite; }

  @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

  .market-footer {
    display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid var(--border);
    padding-top: 25px; text-align: center; gap: 20px; position: relative; z-index: 10;
  }
  .timer-box:first-child { border-right: 1px solid var(--border); }
  .timer-label { font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; letter-spacing: 2px; }
  .timer-sublabel { font-size: 10px; color: var(--accent); text-transform: uppercase; font-weight: 700; margin-bottom: 10px; }
  .timer-val { font-size: 22px; font-weight: 700; font-family: var(--mono); color: var(--text); letter-spacing: -1px; }

  .theme-toggle { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 50%; cursor: pointer; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body data-theme="dark">

  <canvas id="chart-canvas"></canvas>

  <div class="header">
    <span class="location">Elite Global Terminal</span>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
  </div>

  <div class="clock-container">
    <div class="day-text" id="day-name">Thursday</div>
    <div class="time-text" id="main-clock">00:00:00</div>
    <div class="date-text" id="full-date">APR 30, 2026</div>
    <div class="session-timeline"><div id="timeline-fill"></div></div>
  </div>

  <div class="sessions">
    <div class="session-badge" id="session-london"><div class="dot"></div> London</div>
    <div class="session-badge" id="session-ny"><div class="dot"></div> New York</div>
  </div>

  <div class="market-footer">
    <div class="timer-box">
      <div class="timer-label">Session Remaining</div>
      <div id="close-name" class="timer-sublabel">London Market</div>
      <div class="timer-val" id="next-close">--:--:--</div>
    </div>
    <div class="timer-box">
      <div class="timer-label">Next Opportunity</div>
      <div id="open-name" class="timer-sublabel">Sydney Market</div>
      <div class="timer-val" id="next-open">--:--:--</div>
    </div>
  </div>

<script>
  function toggleTheme() {
    const body = document.body;
    body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  }

  // --- REALISTIC TRENDING CHART LOGIC ---
  const canvas = document.getElementById('chart-canvas');
  const ctx = canvas.getContext('2d');
  let candles = [];
  let lastClose = window.innerHeight / 2;
  const candleWidth = 12;
  const spacing = 4;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.onresize = resize;
  resize();

  function generateCandle() {
    // Trend logic: current open = last close
    let open = lastClose;
    // Volatility: moves up or down by max 40px
    let change = (Math.random() - 0.5) * 60; 
    let close = open + change;
    
    // Constraints to keep chart on screen
    if (close < 100) close += 50;
    if (close > canvas.height - 100) close -= 50;

    let high = Math.min(open, close) - Math.random() * 20;
    let low = Math.max(open, close) + Math.random() * 20;

    lastClose = close;

    return {
      x: canvas.width,
      open: open,
      close: close,
      high: high,
      low: low,
      color: close < open ? '#4ade80' : '#f87171' // Green for up, Red for down
    };
  }

  // Initialize with some candles
  for(let i = 0; i < 50; i++) {
    let c = generateCandle();
    c.x = (canvas.width) - (i * (candleWidth + spacing));
    candles.push(c);
  }

  function animateChart() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Slow crawl speed
    const speed = 0.5;

    candles.forEach((c, i) => {
      c.x -= speed;
      ctx.strokeStyle = c.color;
      ctx.fillStyle = c.color;
      ctx.lineWidth = 1.5;
      
      // Wick
      ctx.beginPath();
      ctx.moveTo(c.x + candleWidth/2, c.high);
      ctx.lineTo(c.x + candleWidth/2, c.low);
      ctx.stroke();
      
      // Body
      let bodyHeight = Math.abs(c.close - c.open);
      ctx.fillRect(c.x, Math.min(c.open, c.close), candleWidth, Math.max(bodyHeight, 2));
    });

    // When the right-most candle has moved enough, add a new one
    if (candles[0].x <= canvas.width - (candleWidth + spacing)) {
        let newC = generateCandle();
        candles.unshift(newC);
    }

    // Cleanup off-screen candles
    if (candles[candles.length - 1].x < -50) {
        candles.pop();
    }

    requestAnimationFrame(animateChart);
  }
  animateChart();

  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('main-clock').textContent = `${h}:${m}:${s}`;

    const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    document.getElementById('day-name').textContent = days[now.getDay()];
    const dateOptions = { month: 'short', day: '2-digit', year: 'numeric' };
    document.getElementById('full-date').textContent = now.toLocaleDateString('en-US', dateOptions).toUpperCase();

    const utcHour = now.getUTCHours();
    const totalUtcSeconds = (utcHour * 3600) + (now.getUTCMinutes() * 60) + now.getUTCSeconds();

    const londonActive = utcHour >= 8 && utcHour < 16;
    const nyActive = utcHour >= 13 && utcHour < 21;
    document.getElementById('session-london').classList.toggle('active', londonActive);
    document.getElementById('session-ny').classList.toggle('active', nyActive);

    let progress = 0;
    if (nyActive) progress = ((totalUtcSeconds - (13 * 3600)) / (8 * 3600)) * 100;
    else if (londonActive) progress = ((totalUtcSeconds - (8 * 3600)) / (8 * 3600)) * 100;
    document.getElementById('timeline-fill').style.width = progress + '%';

    // Countdown Logic
    let closeTarget, closeName;
    if (utcHour < 16) { closeTarget = 16 * 3600; closeName = "London Session"; }
    else if (utcHour < 21) { closeTarget = 21 * 3600; closeName = "New York Session"; }
    else { closeTarget = (16 + 24) * 3600; closeName = "London Session"; }
    document.getElementById('close-name').textContent = closeName;
    document.getElementById('next-close').textContent = formatCountdown(closeTarget - totalUtcSeconds);

    let openTarget, openName;
    if (totalUtcSeconds < 8 * 3600) { openTarget = 8 * 3600; openName = "London Session"; }
    else if (totalUtcSeconds < 13 * 3600) { openTarget = 13 * 3600; openName = "New York Session"; }
    else if (totalUtcSeconds < 22 * 3600) { openTarget = 22 * 3600; openName = "Sydney Session"; }
    else { openTarget = (8 + 24) * 3600; openName = "London Session"; }
    document.getElementById('open-name').textContent = openName;
    document.getElementById('next-open').textContent = formatCountdown(openTarget - totalUtcSeconds);
  }

  function formatCountdown(sec) {
    if (sec < 0) sec += 86400;
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    return `${String(h).padStart(2, '0')}h ${String(m).padStart(2, '0')}m ${String(s).padStart(2, '0')}s`;
  }

  setInterval(updateClock, 1000);
  updateClock();
</script>
</body>
</html>
