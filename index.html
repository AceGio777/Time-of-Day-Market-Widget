<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elite Terminal | Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700&display=swap" rel="stylesheet" />
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e0f; --surface: #18181b; --border: #2a2a2e;
    --text: #f4f4f5; --muted: #71717a; --accent: #22d3ee;
    --green: #4ade80; --red: #f87171; --mono: 'DM Mono', monospace; --syne: 'Syne', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); transition: 0.3s; overflow: hidden; position: relative; min-height: 100vh; }

  /* Background Chart */
  #chart-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.2; pointer-events: none; }

  /* 1. TICKER TAPE */
  .ticker-wrap {
    width: 100%; overflow: hidden; background: rgba(0,0,0,0.5);
    border-bottom: 1px solid var(--border); white-space: nowrap; padding: 5px 0;
  }
  .ticker-move { display: inline-block; animation: ticker 20s linear infinite; }
  @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
  .ticker-item { display: inline-block; padding: 0 30px; font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }

  /* MAIN LAYOUT GRID */
  .terminal-main { display: grid; grid-template-columns: 180px 1fr 180px; align-items: center; padding: 20px; height: calc(100vh - 30px); }

  /* 2. TODAY'S P&L BOX */
  .pnl-box { 
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px; 
    text-align: center; display: flex; flex-direction: column; justify-content: center; min-height: 100px;
  }
  .pnl-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
  .pnl-val { font-family: Impact; font-size: 32px; color: var(--text); }
  .pnl-locked { font-size: 8px; color: var(--muted); text-transform: uppercase; line-height: 1.4; }

  /* 3. CLOCK SPREAD */
  .clock-container { text-align: center; }
  .day-text { font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 10px; margin-bottom: 10px; }
  .time-text { 
    font-family: Impact, sans-serif; 
    font-size: 130px; 
    line-height: 0.8; 
    letter-spacing: 12px; /* Spread out lettering */
    color: var(--text);
    filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.1));
  }
  .ampm { font-size: 30px; vertical-align: middle; margin-left: -10px; opacity: 0.5; }
  .date-text { font-size: 12px; color: var(--muted); margin-top: 15px; letter-spacing: 4px; }

  /* SESSION BADGES */
  .sessions-footer { position: absolute; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: center; gap: 15px; }
  .session-badge {
    padding: 6px 14px; border-radius: 4px; border: 1px solid var(--border);
    font-size: 9px; font-weight: 700; text-transform: uppercase; color: var(--muted);
    display: flex; align-items: center; gap: 6px; background: var(--bg);
  }
  .session-badge.active { border-color: var(--accent); color: var(--text); }
  .dot { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; }
  .active .dot { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

  .theme-toggle { position: absolute; top: 45px; right: 20px; background: none; border: none; cursor: pointer; font-size: 18px; }
</style>
</head>
<body>

  <div class="ticker-wrap">
    <div class="ticker-move" id="ticker-content">
      <span class="ticker-item">Awaiting Journal Sync...</span>
    </div>
  </div>

  <canvas id="chart-canvas"></canvas>
  <button class="theme-toggle" onclick="toggleTheme()">🌓</button>

  <div class="terminal-main">
    <div class="pnl-box" id="daily-pnl-box">
        <div class="pnl-locked">Login to journal<br>to view today's P&L</div>
    </div>

    <div class="clock-container">
      <div class="day-text" id="day-name">Thursday</div>
      <div class="time-text"><span id="main-clock">00:00:00</span><span class="ampm" id="ampm">AM</span></div>
      <div class="date-text" id="full-date">APR 30, 2026</div>
    </div>

    <div class="pnl-box">
        <div class="pnl-label">System Status</div>
        <div class="pnl-val" style="font-size: 18px; color: var(--accent);">READY</div>
    </div>
  </div>

  <div class="sessions-footer">
    <div class="session-badge" id="s-sydney"><div class="dot"></div> Sydney</div>
    <div class="session-badge" id="s-tokyo"><div class="dot"></div> Tokyo</div>
    <div class="session-badge" id="s-london"><div class="dot"></div> London</div>
    <div class="session-badge" id="s-ny"><div class="dot"></div> New York</div>
  </div>

<script>
  // --- CONFIG (USE SAME AS JOURNAL) ---
  const firebaseConfig = {
    apiKey: "AIzaSyBaUuA3BTSTZG5jV4GzIEb0WaVXflbLprw",
    authDomain: "ace-gio-s-day-trading-notion.firebaseapp.com",
    projectId: "ace-gio-s-day-trading-notion",
    storageBucket: "ace-gio-s-day-trading-notion.firebasestorage.app",
    messagingSenderId: "676599193285",
    appId: "1:676599193285:web:a5f239951e83fb3a87daac"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();

  auth.onAuthStateChanged(user => {
    if (user) {
      db.ref('users/' + user.uid + '/history').on('value', s => {
        const history = s.val() || [];
        updateTickerAndPnl(history);
      });
    }
  });

  function updateTickerAndPnl(history) {
    if (history.length === 0) return;

    // 1. Update Ticker Tape
    const lastTrade = history[0];
    const wins = history.filter(t => t.pnl > 0).length;
    const wr = Math.round((wins / history.length) * 100);
    const tickerStr = `LAST TRADE: ${lastTrade.ticker} ${lastTrade.pnl >= 0 ? '+' : ''}$${lastTrade.pnl} • OVERALL WIN RATE: ${wr}% • TOTAL TRADES: ${history.length} • TERMINAL ACTIVE •`;
    document.getElementById('ticker-content').innerHTML = `<span class="ticker-item">${tickerStr}</span><span class="ticker-item">${tickerStr}</span>`;

    // 2. Update Today's P&L
    const todayStr = new Date().toLocaleDateString();
    const todayPnl = history
        .filter(t => t.date === todayStr && (t.type || 'live') === 'live')
        .reduce((sum, t) => sum + t.pnl, 0);

    const pnlBox = document.getElementById('daily-pnl-box');
    pnlBox.innerHTML = `
        <div class="pnl-label">Today's P&L</div>
        <div class="pnl-val" style="color:${todayPnl >= 0 ? 'var(--green)' : 'var(--red)'}">
            ${todayPnl >= 0 ? '$' : '-$'}${Math.abs(todayPnl).toLocaleString()}
        </div>
    `;
  }

  function updateClock() {
    const now = new Date();
    
    // 12-Hour Clock
    let h = now.getHours();
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12;
    h = h ? h : 12; // convert 0 to 12
    
    document.getElementById('main-clock').textContent = `${String(h).padStart(2, '0')}:${m}:${s}`;
    document.getElementById('ampm').textContent = ampm;

    const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    document.getElementById('day-name').textContent = days[now.getDay()];
    document.getElementById('full-date').textContent = now.toLocaleDateString('en-US', { month: 'short', day: '2-digit', year: 'numeric' }).toUpperCase();

    // Market Session Logic (UTC)
    const utcHour = now.getUTCHours();
    document.getElementById('s-sydney').classList.toggle('active', utcHour >= 22 || utcHour < 6);
    document.getElementById('s-tokyo').classList.toggle('active', utcHour >= 0 && utcHour < 9);
    document.getElementById('s-london').classList.toggle('active', utcHour >= 8 && utcHour < 16);
    document.getElementById('s-ny').classList.toggle('active', utcHour >= 13 && utcHour < 21);
  }

  // --- CHART ANIMATION ---
  const canvas = document.getElementById('chart-canvas');
  const ctx = canvas.getContext('2d');
  let candles = [];
  let lastClose = window.innerHeight / 2;

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.onresize = resize; resize();

  function generateCandle() {
    let open = lastClose;
    let change = (Math.random() - 0.5) * 50; 
    let close = open + change;
    if (close < 150) close += 100; if (close > canvas.height - 150) close -= 100;
    lastClose = close;
    return { x: canvas.width, open, close, high: Math.min(open, close) - 10, low: Math.max(open, close) + 10, color: close < open ? '#4ade80' : '#f87171' };
  }

  for(let i=0; i<60; i++) { let c = generateCandle(); c.x = canvas.width - (i * 16); candles.push(c); }

  function animateChart() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    candles.forEach((c, i) => {
      c.x -= 0.4; // Very slow crawl
      ctx.strokeStyle = c.color; ctx.fillStyle = c.color; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(c.x + 6, c.high); ctx.lineTo(c.x + 6, c.low); ctx.stroke();
      ctx.fillRect(c.x, Math.min(c.open, c.close), 12, Math.max(Math.abs(c.close-c.open), 2));
    });
    if (candles[0].x <= canvas.width - 16) { candles.unshift(generateCandle()); }
    if (candles[candles.length-1].x < -20) candles.pop();
    requestAnimationFrame(animateChart);
  }
  animateChart();

  function toggleTheme() {
    const b = document.body;
    const isDark = b.getAttribute('data-theme') !== 'light';
    b.setAttribute('data-theme', isDark ? 'light' : 'dark');
  }

  setInterval(updateClock, 1000);
  updateClock();
</script>
</body>
</html>
