<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elite Clock | Market Sessions</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e0f; --surface: #18181b; --border: #2a2a2e;
    --text: #f4f4f5; --muted: #71717a; --accent: #22d3ee;
    --green: #4ade80; --red: #f87171; --mono: 'DM Mono', monospace; --syne: 'Syne', sans-serif;
  }
  [data-theme="light"] {
    --bg: #f4f4f5; --surface: #ffffff; --border: #e4e4e7;
    --text: #09090b; --muted: #71717a; --accent: #0891b2;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); padding: 20px; transition: background 0.3s; overflow: hidden; }

  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .location { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }

  /* Bold Clock Display */
  .clock-container { text-align: center; margin: 15px 0; }
  .day-text { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 4px; margin-bottom: 2px; }
  .time-text { 
    font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif; 
    font-size: 64px; 
    text-transform: uppercase;
    line-height: 0.9; 
    letter-spacing: -1px;
    margin-bottom: 8px;
  }
  .date-text { font-size: 12px; color: var(--muted); margin-bottom: 15px; letter-spacing: 1px; }

  /* Session Badges */
  .sessions { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
  .session-badge {
    padding: 6px 14px; border-radius: 4px; border: 1px solid var(--border);
    font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--muted);
    display: flex; align-items: center; gap: 6px; transition: 0.3s;
  }
  .session-badge.active { border-color: var(--accent); color: var(--text); background: rgba(34, 211, 238, 0.05); }
  .dot { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; }
  .active .dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

  /* Market Timers */
  .market-footer {
    display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid var(--border);
    padding-top: 15px; text-align: center; gap: 10px;
  }
  .timer-box:first-child { border-right: 1px solid var(--border); }
  .timer-label { font-size: 9px; color: var(--muted); text-transform: uppercase; margin-bottom: 2px; letter-spacing: 1px; }
  .timer-sublabel { font-size: 8px; color: var(--accent); text-transform: uppercase; font-weight: 700; margin-bottom: 6px; opacity: 0.8; }
  .timer-val { font-size: 14px; font-weight: 500; font-family: var(--mono); }

  .theme-toggle {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 8px; border-radius: 4px; cursor: pointer; width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
  }
</style>
</head>
<body data-theme="dark">

  <div class="header">
    <span class="location">Global Terminal</span>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
  </div>

  <div class="clock-container">
    <div class="day-text" id="day-name">Thursday</div>
    <div class="time-text" id="main-clock">00:00:00</div>
    <div class="date-text" id="full-date">APR 30, 2026</div>
  </div>

  <div class="sessions">
    <div class="session-badge" id="session-london">
      <div class="dot"></div> London
    </div>
    <div class="session-badge" id="session-ny">
      <div class="dot"></div> New York
    </div>
  </div>

  <div class="market-footer">
    <div class="timer-box">
      <div class="timer-label">Soonest Close</div>
      <div id="close-name" class="timer-sublabel">London Market</div>
      <div class="timer-val" id="next-close">--:--:--</div>
    </div>
    <div class="timer-box">
      <div class="timer-label">Next Opens</div>
      <div id="open-name" class="timer-sublabel">Sydney Market</div>
      <div class="timer-val" id="next-open">--:--:--</div>
    </div>
  </div>

<script>
  function toggleTheme() {
    const body = document.body;
    body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  }

  function updateClock() {
    const now = new Date();
    
    // Main Clock
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('main-clock').textContent = `${h}:${m}:${s}`;

    // Date
    const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    document.getElementById('day-name').textContent = days[now.getDay()];
    const dateOptions = { month: 'short', day: '2-digit', year: 'numeric' };
    document.getElementById('full-date').textContent = now.toLocaleDateString('en-US', dateOptions).toUpperCase();

    const utcHour = now.getUTCHours();
    const utcMin = now.getUTCMinutes();
    const utcSec = now.getUTCSeconds();
    const totalUtcSeconds = (utcHour * 3600) + (utcMin * 60) + utcSec;

    // Active Status
    const londonActive = utcHour >= 8 && utcHour < 16;
    const nyActive = utcHour >= 13 && utcHour < 21;
    document.getElementById('session-london').classList.toggle('active', londonActive);
    document.getElementById('session-ny').classList.toggle('active', nyActive);

    // Logic for "Soonest Close"
    // London closes 16:00 UTC, NY closes 21:00 UTC
    let closeTarget, closeName;
    if (utcHour < 16) {
      closeTarget = 16 * 3600;
      closeName = "London Session";
    } else if (utcHour < 21) {
      closeTarget = 21 * 3600;
      closeName = "New York Session";
    } else {
      closeTarget = (16 + 24) * 3600; // London tomorrow
      closeName = "London Session";
    }
    document.getElementById('close-name').textContent = closeName;
    document.getElementById('next-close').textContent = formatCountdown(closeTarget - totalUtcSeconds);

    // Logic for "Next Open"
    // Sydney 22:00 UTC, Tokyo 00:00 UTC, London 08:00 UTC, NY 13:00 UTC
    let openTarget, openName;
    if (totalUtcSeconds < 8 * 3600) {
      openTarget = 8 * 3600;
      openName = "London Session";
    } else if (totalUtcSeconds < 13 * 3600) {
      openTarget = 13 * 3600;
      openName = "New York Session";
    } else if (totalUtcSeconds < 22 * 3600) {
      openTarget = 22 * 3600;
      openName = "Sydney Session";
    } else {
      openTarget = (8 + 24) * 3600;
      openName = "London Session";
    }
    document.getElementById('open-name').textContent = openName;
    document.getElementById('next-open').textContent = formatCountdown(openTarget - totalUtcSeconds);
  }

  function formatCountdown(sec) {
    if (sec < 0) sec += 86400;
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    return `${String(h).padStart(2, '0')}h ${String(m).padStart(2, '0')}m ${String(s).padStart(2, '0')}s`;
  }

  setInterval(updateClock, 1000);
  updateClock();
</script>
</body>
</html>
