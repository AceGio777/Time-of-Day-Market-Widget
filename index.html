<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elite Clock | Market Sessions</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e0f; --surface: #18181b; --border: #2a2a2e;
    --text: #f4f4f5; --muted: #71717a; --accent: #22d3ee;
    --green: #4ade80; --red: #f87171; --mono: 'DM Mono', monospace; --syne: 'Syne', sans-serif;
  }
  [data-theme="light"] {
    --bg: #f4f4f5; --surface: #ffffff; --border: #e4e4e7;
    --text: #09090b; --muted: #71717a; --accent: #0891b2;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); padding: 20px; transition: background 0.3s; overflow: hidden; }

  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .location { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }

  /* Clock Display */
  .clock-container { text-align: center; margin: 20px 0; }
  .day-text { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px; }
  .time-text { font-family: var(--syne); font-size: 48px; font-weight: 700; line-height: 1; margin-bottom: 5px; }
  .date-text { font-size: 12px; color: var(--muted); margin-bottom: 20px; }

  /* Session Badges */
  .sessions { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
  .session-badge {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--muted);
    display: flex; align-items: center; gap: 6px; transition: 0.3s;
  }
  .session-badge.active { border-color: var(--accent); color: var(--text); box-shadow: 0 0 10px rgba(34, 211, 238, 0.15); }
  .dot { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; }
  .active .dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

  /* Market Timers */
  .market-footer {
    display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid var(--border);
    padding-top: 15px; text-align: center;
  }
  .timer-box:first-child { border-right: 1px solid var(--border); }
  .timer-label { font-size: 9px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
  .timer-val { font-size: 13px; font-weight: 500; }

  .theme-toggle {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 8px; border-radius: 50%; cursor: pointer; width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
  }
</style>
</head>
<body data-theme="dark">

  <div class="header">
    <span class="location" id="tz-label">New York</span>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
  </div>

  <div class="clock-container">
    <div class="day-text" id="day-name">Thursday</div>
    <div class="time-text" id="main-clock">00:00:00</div>
    <div class="date-text" id="full-date">APR 30, 2026</div>
  </div>

  <div class="sessions">
    <div class="session-badge" id="session-london">
      <div class="dot"></div> London
    </div>
    <div class="session-badge" id="session-ny">
      <div class="dot"></div> New York
    </div>
  </div>

  <div class="market-footer">
    <div class="timer-box">
      <div class="timer-label">Next Open</div>
      <div class="timer-val" id="next-open">--:--</div>
    </div>
    <div class="timer-box">
      <div class="timer-label">Next Close</div>
      <div class="timer-val" id="next-close">--:--</div>
    </div>
  </div>

<script>
  function toggleTheme() {
    const body = document.body;
    body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  }

  function updateClock() {
    const now = new Date();
    
    // Format Time
    const timeStr = now.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    document.getElementById('main-clock').textContent = timeStr;

    // Format Date
    const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    document.getElementById('day-name').textContent = days[now.getDay()];
    
    const dateOptions = { month: 'short', day: '2-digit', year: 'numeric' };
    document.getElementById('full-date').textContent = now.toLocaleDateString('en-US', dateOptions).toUpperCase();

    // Session Logic (UTC Based)
    const utcHour = now.getUTCHours();
    
    // London: 08:00 - 16:00 UTC
    const londonActive = utcHour >= 8 && utcHour < 16;
    document.getElementById('session-london').classList.toggle('active', londonActive);

    // NY: 13:00 - 21:00 UTC
    const nyActive = utcHour >= 13 && utcHour < 21;
    document.getElementById('session-ny').classList.toggle('active', nyActive);

    // Simple Countdown Logic
    // NY Close is 21:00 UTC
    let closeRemaining = (21 - utcHour);
    if (closeRemaining < 0) closeRemaining += 24;
    document.getElementById('next-close').textContent = closeRemaining + "h remaining";

    // Sydney Open is 22:00 UTC
    let openRemaining = (22 - utcHour);
    if (openRemaining < 0) openRemaining += 24;
    document.getElementById('next-open').textContent = openRemaining + "h remaining";
  }

  setInterval(updateClock, 1000);
  updateClock();
</script>
</body>
</html>
